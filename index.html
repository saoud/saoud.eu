<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saoud — Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --accent: #0bc;
      --green: #0f0;
      --pink: #ff0096;
      --muted: #555;
      --font-mono: 'Fira Code', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: clamp(0.85rem, 2vw, 1rem);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.12) 0px,
        rgba(0, 0, 0, 0.12) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 1000;
    }

    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      transition: width 0.1s linear;
      z-index: 1001;
    }

    #controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 1002;
    }

    #controls button {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s ease;
    }

    #controls button:hover,
    #controls button:focus-visible {
      border-color: var(--accent);
      background: rgba(0, 188, 204, 0.1);
      outline: none;
    }

    #console {
      max-width: 750px;
      width: 90vw;
      margin: 3rem auto;
      padding: 1rem;
      position: relative;
      white-space: pre-wrap;
      word-break: break-word;
    }

    #console #a { color: var(--green); }
    #console #b { color: var(--pink); }
    #console #c { color: var(--accent); }

    #console a {
      color: var(--accent);
      text-decoration: none;
      transition: text-shadow 0.2s ease;
    }

    #console a:hover,
    #console a:focus-visible {
      text-shadow: 0 0 6px var(--accent);
      outline: none;
    }

    #console p {
      margin: 0.75em 0;
    }

    #text-wrapper {
      display: inline;
    }

    #console.typing #text-wrapper::after {
      content: '█';
      display: inline;
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    #loading {
      color: var(--muted);
      font-style: italic;
    }

    #loading.error {
      color: var(--pink);
    }

    /* Command input area */
    #command-input {
      max-width: 750px;
      width: 90vw;
      margin: 0 auto;
      padding: 0 1rem 2rem;
      display: none;
    }

    #command-input.visible {
      display: block;
    }

    #command-input .prompt {
      color: var(--green);
    }

    #command-input input {
      background: transparent;
      border: none;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: inherit;
      outline: none;
      width: calc(100% - 200px);
      caret-color: var(--accent);
    }

    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #modal.visible {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    #modal .content {
      border: 2px solid var(--accent);
      padding: 2rem 3rem;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: 700;
      text-align: center;
      background: var(--bg);
      border-radius: 4px;
      font-family: var(--font-mono);
      white-space: pre-wrap;
    }

    #modal .content.denied {
      border-color: var(--pink);
      color: var(--pink);
      box-shadow: 0 0 30px var(--pink);
    }

    #modal .content.granted {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 30px var(--green);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    #complete {
      display: none;
      text-align: center;
      color: var(--muted);
      margin: 2rem auto;
      padding-bottom: 3rem;
      font-size: 0.85rem;
    }

    #complete.visible {
      display: block;
      animation: fadeIn 1s ease;
    }

    #hint {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.7rem;
      z-index: 1002;
      opacity: 0.6;
      text-align: center;
      width: 90vw;
    }

    @media (max-width: 600px) {
      #console {
        margin: 2.5rem auto;
        padding: 0.5rem;
      }
      #controls {
        top: 0.5rem;
        right: 0.5rem;
      }
      #hint { display: none; }
    }
  </style>
</head>
<body>
  <div id="progress"></div>

  <div id="controls">
    <button id="pauseBtn" aria-label="Pause or resume typing">⏸ Pause</button>
    <button id="restartBtn" aria-label="Restart typing">↻ Restart</button>
  </div>

  <div id="console" class="typing" aria-live="polite" role="log">
    <span id="loading">Loading...</span>
    <span id="text-wrapper"></span>
  </div>

  <div id="command-input">
    <span class="prompt">saoud@saoud.eu:~$ </span>
    <input type="text" id="cmdInput" autocomplete="off" autofocus placeholder="type a command...">
  </div>

  <div id="complete">— end of transmission —</div>

  <div id="hint">press any key to speed up · space to pause · type 'resume' when ready</div>

  <div id="modal" role="dialog" aria-modal="true">
    <div class="content" id="modalContent"></div>
  </div>

  <script>
    (() => {
      'use strict';

      const CONFIG = {
        textFile: 'saoud.txt',
        resumeFile: 'resume.pdf',
        charsPerFrame: 3,
        frameInterval: 30,
        keypressMultiplier: 3,
        access: {
          granted: { msg: 'ACCESS GRANTED', shown: false },
          denied:  { msg: 'ACCESS DENIED',  shown: false }
        }
      };

      const state = {
        text: '',
        index: 0,
        paused: false,
        complete: false,
        accessCount: 0,
        deniedCount: 0,
        lastFrameTime: 0,
        animFrameId: null
      };

      const consoleEl      = document.getElementById('console');
      const loadingEl      = document.getElementById('loading');
      const textWrapperEl  = document.getElementById('text-wrapper');
      const progressEl     = document.getElementById('progress');
      const completeEl     = document.getElementById('complete');
      const modalEl        = document.getElementById('modal');
      const modalContentEl = document.getElementById('modalContent');
      const pauseBtn       = document.getElementById('pauseBtn');
      const restartBtn     = document.getElementById('restartBtn');
      const commandInputEl = document.getElementById('command-input');
      const cmdInput       = document.getElementById('cmdInput');

      async function loadText() {
        try {
          const response = await fetch(CONFIG.textFile);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          state.text = (await response.text()).slice(0, -1);
          loadingEl.remove();
          startAnimation();
        } catch (err) {
          loadingEl.textContent = `Failed to load ${CONFIG.textFile}: ${err.message}`;
          loadingEl.classList.add('error');
          consoleEl.classList.remove('typing');
        }
      }

      function startAnimation() {
        state.lastFrameTime = performance.now();
        state.animFrameId = requestAnimationFrame(tick);
      }

      function tick(now) {
        if (state.complete) return;
        if (!state.paused) {
          const elapsed = now - state.lastFrameTime;
          if (elapsed >= CONFIG.frameInterval) {
            advance(CONFIG.charsPerFrame);
            state.lastFrameTime = now;
          }
        }
        state.animFrameId = requestAnimationFrame(tick);
      }

      function advance(count) {
        if (state.index >= state.text.length) {
          onComplete();
          return;
        }
        state.index = Math.min(state.index + count, state.text.length);
        render();
        updateProgress();
      }

      function render() {
        let raw = state.text.substring(0, state.index);

        const lastOpen = raw.lastIndexOf('<');
        const lastClose = raw.lastIndexOf('>');
        if (lastOpen > lastClose) {
          raw = raw.substring(0, lastOpen);
        }

        const html = raw.replace(/\n/g, '<br/>');
        textWrapperEl.innerHTML = html;

        window.scrollTo(0, document.body.scrollHeight);
      }

      function updateProgress() {
        const pct = (state.index / state.text.length) * 100;
        progressEl.style.width = `${pct}%`;
      }

      function onComplete() {
        state.complete = true;
        consoleEl.classList.remove('typing');
        completeEl.classList.add('visible');
        progressEl.style.width = '100%';

        // Show command input when animation completes
        commandInputEl.classList.add('visible');
        cmdInput.focus();
      }

      function showModal(msg, type) {
        modalContentEl.textContent = msg;
        modalContentEl.className = `content ${type}`;
        modalEl.classList.add('visible');
        setTimeout(() => modalEl.classList.remove('visible'), 2500);
      }

      function hideModal() {
        modalEl.classList.remove('visible');
      }

      function togglePause() {
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? '▶ Resume' : '⏸ Pause';
        if (!state.paused) {
          state.lastFrameTime = performance.now();
        }
      }

      function restart() {
        state.index = 0;
        state.paused = false;
        state.complete = false;
        state.accessCount = 0;
        state.deniedCount = 0;
        CONFIG.access.granted.shown = false;
        CONFIG.access.denied.shown = false;
        pauseBtn.textContent = '⏸ Pause';
        completeEl.classList.remove('visible');
        commandInputEl.classList.remove('visible');
        cmdInput.value = '';
        consoleEl.classList.add('typing');
        textWrapperEl.innerHTML = '';
        updateProgress();
        startAnimation();
      }

      pauseBtn.addEventListener('click', togglePause);
      restartBtn.addEventListener('click', restart);

      function handleCommand(cmd) {
        const command = cmd.trim().toLowerCase();

        if (command === 'resume') {
          window.open(CONFIG.resumeFile, '_blank');
          return true;
        }

        if (command === 'help') {
          showModal('Available commands:\nresume — view my resume\nhelp   — show this message\nclear  — restart the animation', 'granted');
          return true;
        }

        if (command === 'clear') {
          restart();
          return true;
        }

        if (command) {
          showModal(`Command not found: ${command}\nType 'help' for available commands`, 'denied');
        }

        return false;
      }

      // Command input handling
      cmdInput.addEventListener('keydown', (e) => {
        if (e.code === 'Enter') {
          const cmd = cmdInput.value;
          handleCommand(cmd);
          cmdInput.value = '';
          e.preventDefault();
        }
      });

      // Global key handling (for animation speed and special keys)
      document.addEventListener('keydown', (e) => {
        if (modalEl.classList.contains('visible')) {
          hideModal();
        }

        // Don't handle keys if command input is focused (except special keys)
        if (document.activeElement === cmdInput) {
          // Alt key → Access Granted after 3 presses
          if (e.keyCode === 18) {
            state.accessCount++;
            if (state.accessCount >= 3) {
              showModal(CONFIG.access.granted.msg, 'granted');
              state.accessCount = 0;
            }
            e.preventDefault();
            return;
          }

          // Caps Lock → Access Denied after 3 presses
          if (e.keyCode === 20) {
            state.deniedCount++;
            if (state.deniedCount >= 3) {
              showModal(CONFIG.access.denied.msg, 'denied');
              state.deniedCount = 0;
            }
            e.preventDefault();
            return;
          }

          // Escape → hide modal or blur input
          if (e.keyCode === 27) {
            if (modalEl.classList.contains('visible')) {
              hideModal();
            } else {
              cmdInput.blur();
            }
            e.preventDefault();
            return;
          }

          // Let other keys pass through to input
          return;
        }

        // Alt key → Access Granted after 3 presses
        if (e.keyCode === 18) {
          state.accessCount++;
          if (state.accessCount >= 3) {
            showModal(CONFIG.access.granted.msg, 'granted');
            state.accessCount = 0;
          }
          e.preventDefault();
          return;
        }

        // Caps Lock → Access Denied after 3 presses
        if (e.keyCode === 20) {
          state.deniedCount++;
          if (state.deniedCount >= 3) {
            showModal(CONFIG.access.denied.msg, 'denied');
            state.deniedCount = 0;
          }
          e.preventDefault();
          return;
        }

        // Escape → hide modal
        if (e.keyCode === 27) {
          hideModal();
          e.preventDefault();
          return;
        }

        // Space → toggle pause
        if (e.code === 'Space') {
          e.preventDefault();
          togglePause();
          return;
        }

        // Tab → focus command input if animation is complete
        if (e.code === 'Tab' && state.complete) {
          e.preventDefault();
          cmdInput.focus();
          return;
        }

        // Advance text animation on any keypress (if not paused and not complete)
        if (!state.complete && !state.paused) {
          advance(CONFIG.charsPerFrame * CONFIG.keypressMultiplier);
        }
      });

      modalEl.addEventListener('click', hideModal);

      loadText();
    })();
  </script>
</body>
</html>
