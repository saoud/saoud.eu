<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Saoud — Terminal</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #000;
      --text: #fff;
      --accent: #0bc;
      --green: #0f0;
      --pink: #ff0096;
      --muted: #555;
      --font-mono: 'Fira Code', 'Courier New', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: clamp(0.85rem, 2vw, 1rem);
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Subtle CRT scanline overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.12) 0px,
        rgba(0, 0, 0, 0.12) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 1000;
    }

    /* Progress bar */
    #progress {
      position: fixed;
      top: 0;
      left: 0;
      height: 3px;
      width: 0%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      transition: width 0.1s linear;
      z-index: 1001;
    }

    /* Controls */
    #controls {
      position: fixed;
      top: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      z-index: 1002;
    }

    #controls button {
      background: transparent;
      border: 1px solid var(--muted);
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.25rem 0.75rem;
      cursor: pointer;
      border-radius: 3px;
      transition: all 0.2s ease;
    }

    #controls button:hover,
    #controls button:focus-visible {
      border-color: var(--accent);
      background: rgba(0, 188, 204, 0.1);
      outline: none;
    }

    /* Console container */
    #console {
      max-width: 750px;
      width: 90vw;
      margin: 3rem auto;
      padding: 1rem;
      position: relative;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Colored spans matching original: #a = green (user), #b = pink (dir), #c = accent ($ prompt) */
    #console #a { color: var(--green); }
    #console #b { color: var(--pink); }
    #console #c { color: var(--accent); }

    /* Links inside the typed content */
    #console a {
      color: var(--accent);
      text-decoration: none;
      transition: text-shadow 0.2s ease;
    }

    #console a:hover,
    #console a:focus-visible {
      text-shadow: 0 0 6px var(--accent);
      outline: none;
    }

    /* Paragraphs inside typed content */
    #console p {
      margin: 0.75em 0;
    }

    /* Blinking cursor via CSS pseudo-element on the text wrapper */
    #text-wrapper {
      display: inline;
    }

    #console.typing #text-wrapper::after {
      content: '█';
      display: inline;
      color: var(--accent);
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* Loading state */
    #loading {
      color: var(--muted);
      font-style: italic;
    }

    #loading.error {
      color: var(--pink);
    }

    /* Modal overlay for access granted/denied */
    #modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    #modal.visible {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    #modal .content {
      border: 2px solid var(--accent);
      padding: 2rem 3rem;
      font-size: clamp(1.2rem, 4vw, 1.5rem);
      font-weight: 700;
      text-align: center;
      background: var(--bg);
      border-radius: 4px;
      font-family: var(--font-mono);
    }

    #modal .content.denied {
      border-color: var(--pink);
      color: var(--pink);
      box-shadow: 0 0 30px var(--pink);
    }

    #modal .content.granted {
      border-color: var(--green);
      color: var(--green);
      box-shadow: 0 0 30px var(--green);
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    /* Completion message */
    #complete {
      display: none;
      text-align: center;
      color: var(--muted);
      margin: 2rem auto;
      padding-bottom: 3rem;
      font-size: 0.85rem;
    }

    #complete.visible {
      display: block;
      animation: fadeIn 1s ease;
    }

    /* Keyboard hint */
    #hint {
      position: fixed;
      bottom: 1rem;
      left: 50%;
      transform: translateX(-50%);
      color: var(--muted);
      font-size: 0.7rem;
      z-index: 1002;
      opacity: 0.6;
    }

    /* Responsive */
    @media (max-width: 600px) {
      #console {
        margin: 2.5rem auto;
        padding: 0.5rem;
      }
      #controls {
        top: 0.5rem;
        right: 0.5rem;
      }
      #hint { display: none; }
    }
  </style>
</head>
<body>
  <div id="progress"></div>

  <div id="controls">
    <button id="pauseBtn" aria-label="Pause or resume typing">⏸ Pause</button>
    <button id="restartBtn" aria-label="Restart typing">↻ Restart</button>
  </div>

  <div id="console" class="typing" aria-live="polite" role="log">
    <span id="loading">Loading...</span>
    <span id="text-wrapper"></span>
  </div>

  <div id="complete">— end of transmission —</div>

  <div id="hint">press any key to type faster · space to pause · alt×3 = access granted · caps×3 = access denied</div>

  <div id="modal" role="dialog" aria-modal="true">
    <div class="content" id="modalContent"></div>
  </div>

  <script>
    (() => {
      'use strict';

      const CONFIG = {
        textFile: 'saoud.txt',
        charsPerFrame: 3,
        frameInterval: 30,
        keypressMultiplier: 3,
        access: {
          granted: { msg: 'ACCESS GRANTED', shown: false },
          denied:  { msg: 'ACCESS DENIED',  shown: false }
        }
      };

      const state = {
        text: '',
        index: 0,
        paused: false,
        complete: false,
        accessCount: 0,
        deniedCount: 0,
        lastFrameTime: 0,
        animFrameId: null
      };

      // DOM references
      const consoleEl      = document.getElementById('console');
      const loadingEl      = document.getElementById('loading');
      const textWrapperEl  = document.getElementById('text-wrapper');
      const progressEl     = document.getElementById('progress');
      const completeEl     = document.getElementById('complete');
      const modalEl        = document.getElementById('modal');
      const modalContentEl = document.getElementById('modalContent');
      const pauseBtn       = document.getElementById('pauseBtn');
      const restartBtn     = document.getElementById('restartBtn');

      // --- Text loading ---
      async function loadText() {
        try {
          const response = await fetch(CONFIG.textFile);
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          // Remove trailing character (usually a trailing newline) like the original
          state.text = (await response.text()).slice(0, -1);
          loadingEl.remove();
          startAnimation();
        } catch (err) {
          loadingEl.textContent = `Failed to load ${CONFIG.textFile}: ${err.message}`;
          loadingEl.classList.add('error');
          consoleEl.classList.remove('typing');
        }
      }

      // --- Animation loop ---
      function startAnimation() {
        state.lastFrameTime = performance.now();
        state.animFrameId = requestAnimationFrame(tick);
      }

      function tick(now) {
        if (state.complete) return;
        if (!state.paused) {
          const elapsed = now - state.lastFrameTime;
          if (elapsed >= CONFIG.frameInterval) {
            advance(CONFIG.charsPerFrame);
            state.lastFrameTime = now;
          }
        }
        state.animFrameId = requestAnimationFrame(tick);
      }

      function advance(count) {
        if (state.index >= state.text.length) {
          onComplete();
          return;
        }
        state.index = Math.min(state.index + count, state.text.length);
        render();
        updateProgress();
      }

      function render() {
        // Take the substring of raw text, replace newlines with <br/>,
        // and inject as innerHTML — matching the original behavior so that
        // HTML tags in saoud.txt (spans, paragraphs, links, comments) render properly.
        const raw = state.text.substring(0, state.index);
        const html = raw.replace(/\n/g, '<br/>');
        textWrapperEl.innerHTML = html;

        // Auto-scroll to bottom
        window.scrollTo(0, document.body.scrollHeight);
      }

      function updateProgress() {
        const pct = (state.index / state.text.length) * 100;
        progressEl.style.width = `${pct}%`;
      }

      function onComplete() {
        state.complete = true;
        consoleEl.classList.remove('typing');
        completeEl.classList.add('visible');
        progressEl.style.width = '100%';
      }

      // --- Modal ---
      function showModal(msg, type) {
        modalContentEl.textContent = msg;
        modalContentEl.className = `content ${type}`;
        modalEl.classList.add('visible');
        setTimeout(() => modalEl.classList.remove('visible'), 1500);
      }

      function hideModal() {
        modalEl.classList.remove('visible');
      }

      // --- Controls ---
      function togglePause() {
        state.paused = !state.paused;
        pauseBtn.textContent = state.paused ? '▶ Resume' : '⏸ Pause';
        if (!state.paused) {
          state.lastFrameTime = performance.now();
        }
      }

      function restart() {
        state.index = 0;
        state.paused = false;
        state.complete = false;
        state.accessCount = 0;
        state.deniedCount = 0;
        CONFIG.access.granted.shown = false;
        CONFIG.access.denied.shown = false;
        pauseBtn.textContent = '⏸ Pause';
        completeEl.classList.remove('visible');
        consoleEl.classList.add('typing');
        textWrapperEl.innerHTML = '';
        updateProgress();
        startAnimation();
      }

      pauseBtn.addEventListener('click', togglePause);
      restartBtn.addEventListener('click', restart);

      // --- Keypress handling (matches original key bindings) ---
      document.addEventListener('keydown', (e) => {
        // Close modal on any key
        if (modalEl.classList.contains('visible')) {
          hideModal();
        }

        if (state.complete) return;

        // Alt key (keyCode 18) → Access Granted after 3 presses
        if (e.keyCode === 18) {
          state.accessCount++;
          if (state.accessCount >= 3) {
            showModal(CONFIG.access.granted.msg, 'granted');
            state.accessCount = 0;
          }
          e.preventDefault();
          return;
        }

        // Caps Lock (keyCode 20) → Access Denied after 3 presses
        if (e.keyCode === 20) {
          state.deniedCount++;
          if (state.deniedCount >= 3) {
            showModal(CONFIG.access.denied.msg, 'denied');
            state.deniedCount = 0;
          }
          e.preventDefault();
          return;
        }

        // Escape → hide modal
        if (e.keyCode === 27) {
          hideModal();
          e.preventDefault();
          return;
        }

        // Space → toggle pause
        if (e.code === 'Space') {
          e.preventDefault();
          togglePause();
          return;
        }

        // Any other key → advance text faster (like original keypress behavior)
        if (!state.paused) {
          advance(CONFIG.charsPerFrame * CONFIG.keypressMultiplier);
        }

        // Prevent default for everything except F11 (fullscreen)
        if (e.preventDefault && e.keyCode !== 122) {
          e.preventDefault();
        }
      });

      // Close modal on click
      modalEl.addEventListener('click', hideModal);

      // --- Boot ---
      loadText();
    })();
  </script>
</body>
</html>
